name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      # PyAudio builds from source and needs PortAudio headers on Linux.
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends portaudio19-dev build-essential

      - name: Install package and test tools
        run: |
          python -m pip install --upgrade pip
          pip install -e . pytest pytest-timeout

      - name: Run tests
        run: pytest dictate_tests.py
