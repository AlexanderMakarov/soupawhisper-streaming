name: CI

on:
  pull_request:
    paths:
      - "**/*.py"
      - "pyproject.toml"
      - "uv.lock"
      - "poetry.lock"
      - ".github/workflows/**"
  push:
    branches: [main]
    paths:
      - "**/*.py"
      - "pyproject.toml"
      - "uv.lock"
      - "poetry.lock"
      - ".github/workflows/**"

jobs:
  test:
    runs-on: ubuntu-latest
    # Use Node.js 24 for JS-based actions (checkout, setup-python); avoids Node 20 deprecation warnings.
    # https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      # PyAudio builds from source and needs PortAudio headers on Linux.
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends portaudio19-dev build-essential

      - name: Install package and test tools
        run: |
          python -m pip install --upgrade pip
          pip install -e . pytest pytest-timeout

      - name: Run tests
        run: pytest dictate_tests.py
