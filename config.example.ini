[whisper]
# Model size: tiny.en, base.en, small.en, medium.en, large-v3
model = base.en

# Device: cpu or cuda (cuda requires cuDNN)
device = cpu

# Compute type: int8 for CPU, float16 for GPU
compute_type = int8

# Language: en, es, ru, auto (auto = detect language automatically, best with non-*.en models)
language = en

# When language = auto: optional comma-separated ISO codes to restrict detection (e.g. only English and Russian).
# Whisper still scores all languages internally; we pick the highest-probability code in this list.
# Helps avoid wrong-language typing on short or noisy audio (e.g. subscription forms).
# language_allowlist = en, ru

[input]
# Audio input device: device index (e.g., 0, 8) or partial device name (e.g., "pulse", "HDA Intel").
# Leave empty to use default device. Run with --verbose to see available devices.
# audio_input_device =

[hotkey]
# Key to hold for recording: F12, scroll_lock, pause, etc.
key = f12

[behavior]
# If streaming is enabled by default.
default_streaming = true

# Show desktop notification
notifications = true

# Copy resulting text to clipboard
clipboard = true

# Type text into active input field
auto_type = true

# Automatically format text as sentence: capitalize first letter and add period at end
auto_sentence = true

# Delay between typing characters in seconds. Make bigger to visualize the typing process.
typing_delay = 0.01

# Save recordings to /tmp with timestamped filenames (disable automatic deletion)
save_recordings = false

# Streaming-only: suppress specific hallucinated/noise phrases.
# If set, any *streaming chunk* that equals one of these phrases (punctuation ignored) is skipped
# (not typed, not added to clipboard output). Multiple phrases in one chunk are NOT rejected.
reject_phrases = thank you, thanks, okay, ok, um, hmm

# Optional: comma-separated custom terms / glossary that Whisper should prefer.
# Improves recognition of names, brands, technical terms, acronyms, multi-word
# phrases, etc. Passed to faster-whisper as both initial_prompt (in-context
# priming) and hotwords (decoder logit bias). Applies to streaming and
# non-streaming modes. Leave empty to disable. Note: this is a *hint*, not a
# guarantee — strongly mismatched audio may still produce other words.
# custom_terms = Claude, Kubernetes, GraphQL, ML repository

# Optional: when [whisper].language=auto, enforce language from current keyboard layout (captured once on start).
# enforce_language_from_layout = true
# layout_to_language = com.apple.keylayout.US:en, com.apple.keylayout.ABC:en, com.apple.keylayout.Russian:ru

[streaming]
# Minimum speech length in seconds required to finalize a speech chunk.
min_speech_length_seconds = 1.0

# Silence duration in seconds required to finalize a speech chunk.
vad_silence_threshold_seconds = 0.5

# Sample rate for streaming audio and VAD (should match Whisper model, 16000 Hz recommended).
vad_sample_rate = 16000

# Size of audio chunks for SAD analysis in milliseconds. Only 10, 20, 30 are supported for now.
vad_chunk_size_ms = 20

# Minimum number of consecutive speech chunks with detected speech required to ensure speech is active.
vad_min_speech_chunks = 10

# VAD aggressiveness threshold (0.0-3.0, lower = more sensitive).
vad_threshold = 1.0
